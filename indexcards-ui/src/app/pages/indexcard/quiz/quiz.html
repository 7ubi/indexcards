<div class="quiz-page">
  @if (loading) {
    <app-loading-spinner />
  } @else {
    <div class="quiz-content">
      <div
        class="card-flip"
        [class.flipped]="showAnswer"
        role="button"
        tabindex="0"
        [attr.aria-pressed]="showAnswer"
        (click)="toggleAnswer()"
        (keydown.enter)="toggleAnswer()"
        (keydown.space)="toggleAnswer()"
      >
        <div class="card-face card-front">
          <span class="card-label">{{ 'indexcard.question' | translate }}</span>
          <div
            class="indexcard-text"
            [innerHTML]="getIndexCard()?.question | markdownMath"
            appMathjax
          ></div>
          <span class="card-hint">{{ 'indexcard.tap_to_reveal' | translate }}</span>
        </div>

        <div class="card-face card-back">
          <span class="card-label">{{ 'indexcard.answer' | translate }}</span>
          <div
            class="indexcard-text"
            [innerHTML]="getIndexCard()?.answer | markdownMath"
            appMathjax
          ></div>
        </div>
      </div>
    </div>

    <div class="assessment-buttons">
      <button
        matButton="filled"
        class="assessment-bad"
        type="button"
        (click)="assessIndexCard('BAD')"
      >
        {{ 'bad' | translate }}
      </button>
      <button
        matButton="filled"
        class="assessment-ok"
        type="button"
        (click)="assessIndexCard('OK')"
      >
        {{ 'ok' | translate }}
      </button>
      <button
        matButton="filled"
        class="assessment-good"
        type="button"
        (click)="assessIndexCard('GOOD')"
      >
        {{ 'good' | translate }}
      </button>
    </div>
  }
</div>
